<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form & Input Events Project</title>

<style>
body {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    font-family: 'Segoe UI', sans-serif;
    padding: 30px;
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 30px;
}

.container {
    max-width: 750px;
    margin: auto;
}

.card {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h3 {
    color: #2a5298;
}

input, select, button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background-color: #2a5298;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #1e3c72;
}
</style>
</head>

<body>

<h1>Form & Input Events</h1>

<div class="container">

<div class="card">
<h3>onchange (Dropdown)</h3>
<select onchange="alert('Brand Changed Successfully!')">
<option>OnePlus</option>
<option>Realme</option>
<option>Google Pixel</option>
</select>
</div>

<div class="card">
<h3>oninput / onchange (Text Box)</h3>
<input type="text"
oninput="console.log('Typing...')"
onchange="alert('Input Completed!')"
placeholder="Type something...">
</div>

<div class="card">
<h3>Form Events (onsubmit / onreset)</h3>
<form onsubmit="alert('Form Submitted Successfully!'); return false;"
onreset="alert('Form Cleared!')">

<input type="email" required placeholder="Enter Email">
<br>
<button type="submit">Submit</button>
<button type="reset">Reset</button>
</form>
</div>

<div class="card">
<h3>onsearch</h3>
<input type="search"
placeholder="Search here..."
onsearch="alert('Search Performed!')">
</div>

<div class="card">
<h3>onselect</h3>
<input type="text"
value="Select this text to trigger event"
onselect="alert('Text Selected!')">
</div>

</div>

</body>
</html>
